<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Migração Firebase</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>body { font-family: sans-serif; padding: 50px; background: #111; color: #fff; text-align: center; }</style>
</head>
<body>
  <h2>Migração de Dados: JSON -> Firestore</h2>
  <button onclick="migrarDados()" style="padding: 15px 30px; font-size: 1.2rem; cursor:pointer; background: #00843D; color: white; border: none; border-radius: 8px;">Enviar Todas as Lojas para Nuvem</button>
  <p id="status" style="margin-top: 20px; color: #e8c547;"></p>

  <script>
    async function migrarDados() {
      const status = document.getElementById('status');
      status.innerText = "Lendo arquivos locais...";
      const lojas = ['mundial_abelardo', 'zonasul_diasferreira', 'paodeacucar_leblon'];
      
      try {
        status.innerText = "Conectando ao Firestore e enviando...";
        for (let lojaId of lojas) {
          const res = await fetch(`./lojas/${lojaId}.json`);
          const data = await res.json();
          await db.collection("lojas").doc(lojaId).set(data);
        }
        
        status.style.color = "#00ff00";
        status.innerText = "✅ SUCESSO! Dados de todas as lojas foram salvos na nuvem.";
      } catch (e) {
        console.error(e);
        status.style.color = "red";
        status.innerText = "❌ ERRO: " + e.message;
      }
    }
  </script>
</body>
</html>

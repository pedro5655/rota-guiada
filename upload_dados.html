<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Migração Firebase</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>body { font-family: sans-serif; padding: 50px; background: #111; color: #fff; text-align: center; }</style>
</head>
<body>
  <h2>Migração de Dados: JSON -> Firestore</h2>
  <button onclick="migrarDados()" style="padding: 15px 30px; font-size: 1.2rem; cursor:pointer; background: #00843D; color: white; border: none; border-radius: 8px;">Enviar Mundial para Nuvem</button>
  <p id="status" style="margin-top: 20px; color: #e8c547;"></p>

  <script>
    async function migrarDados() {
      const status = document.getElementById('status');
      status.innerText = "Lendo arquivo local...";
      try {
        const res = await fetch('./lojas/mundial_abelardo.json');
        const data = await res.json();
        
        status.innerText = "Conectando ao Firestore...";
        
        // Salvando no Firestore na coleção "lojas" sob o documento "mundial_abelardo"
        await db.collection("lojas").doc("mundial_abelardo").set(data);
        
        status.style.color = "#00ff00";
        status.innerText = "✅ SUCESSO! Dados do Mundial foram salvos na nuvem.";
      } catch (e) {
        console.error(e);
        status.style.color = "red";
        status.innerText = "❌ ERRO: " + e.message;
      }
    }
  </script>
</body>
</html>
